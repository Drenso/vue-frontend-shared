stages:
  - prepare
  - lint
  - build
  - publish

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE != "merge_request_event"

include:
  # Prepare
  - project: 'intern/runner-templates'
    ref: "17.2"
    file: '/npm/install-js-dependencies.yml'

  # Lint
  - project: 'intern/runner-templates'
    ref: "17.2"
    file: '/ts/tslint.yml'

  # Build
  - project: 'intern/runner-templates'
    ref: "17.2"
    file: '/npm/build-prod.yml'

install-js-dependencies:
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_REF_NAME == "main"
      when: never
    - when: on_success

ts-analysis:
  except:
    - schedules
    - tags
    - main

build-assets:
  needs:
    - install-js-dependencies
  artifacts:
    when: on_failure
    untracked: true
  except:
    - schedules
    - tags
    - main

publish-pkg:
  stage: publish
  image: node:24-alpine
  resource_group: $CI_JOB_NAME
  needs:
    - install-js-dependencies
  cache:
    key:
      files:
        - package-lock.json
      prefix: ${CI_PROJECT_PATH_SLUG}_npm
    paths:
      - node_modules/
    policy: pull
  script:
    - echo "username=${NPM_USER}" > .npmrc
    - echo "_password=$(echo -n ${NPM_PASS} | base64)" >> .npmrc
    - echo "email=${NPM_EMAIL}" >> .npmrc
    - npm version --new-version ${CI_COMMIT_TAG} --no-git-tag-version
    - npm publish
  after_script:
    - rm .npmrc
  tags:
    - docker
  environment:
    name: Verdaccio
    url: https://npm.drenso.dev/-/web/detail/@drenso/vue-frontend-shared
  rules:
    - if: $CI_COMMIT_TAG
      when: on_success
    - when: never

publish-pkg-npmjs:
  stage: publish
  image: node:24-alpine
  resource_group: ${CI_JOB_NAME}_npmjs
  needs:
    - install-js-dependencies
  cache:
    key:
      files:
        - package-lock.json
      prefix: ${CI_PROJECT_PATH_SLUG}_npm
    paths:
      - node_modules/
    policy: pull
  script:
    - echo "username=${NPMJS_USER}" >> .npmrc
    - echo "email=${NPMJS_EMAIL}" >> .npmrc
    - echo "//${NPMJS_REGISTRY}/:_authToken=${NPMJS_TOKEN}" >> .npmrc
    - echo "registry \"https://${NPMJS_REGISTRY}\"" >> .npmrc
    - npm version --new-version ${CI_COMMIT_TAG} --no-git-tag-version
    - npm publish --access public
  environment:
    name: NPMJS
    url: https://www.npmjs.com/package/@drenso/vue-frontend-shared
  after_script:
    - rm .npmrc
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_TAG
      when: on_success
    - when: never
